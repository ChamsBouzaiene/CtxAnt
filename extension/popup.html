<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CtxAnt</title>
  <style>
    :root { color-scheme: light dark; }
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      font-size: 14px;
      margin: 0;
    }
    .status-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.connected    { background: #22c55e; }
    .dot.connecting   { background: #f59e0b; }
    .dot.disconnected { background: #ef4444; }
    #status-text { font-size: 13px; opacity: 0.8; }
    .hint {
      font-size: 11px;
      opacity: 0.65;
      line-height: 1.5;
      border-top: 1px solid currentColor;
      border-top-color: rgba(128,128,128,0.25);
      padding-top: 10px;
      margin-top: 4px;
    }
    .hint a { color: inherit; }
    .row-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }
    .row-actions a {
      flex: 1;
      text-align: center;
      font-size: 11px;
      text-decoration: none;
      padding: 6px 8px;
      border-radius: 6px;
      border: 1px solid rgba(128,128,128,0.3);
      color: inherit;
    }
    .row-actions a:hover { background: rgba(128,128,128,0.1); }
  </style>
</head>
<body>
  <div class="status-row">
    <div class="dot disconnected" id="dot"></div>
    <span id="status-text">Checking…</span>
  </div>
  <div class="row-actions">
    <a href="http://127.0.0.1:8766/dashboard" target="_blank">Open dashboard</a>
    <a href="https://ctxant.com/help" target="_blank">Help</a>
  </div>
  <div class="hint">
    CtxAnt pairs automatically with the Mac app running on your machine. If this stays
    red, make sure the menu-bar app is running.
  </div>
  <script src="popup.js"></script>
</body>
</html>
