<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Agents — CtxAnt</title>
<meta name="description" content="Browse the flagship Custom Agent / Web Runner workflow plus the starter agents that ship with CtxAnt." />
<link rel="icon" href="/assets/favicon.png" />
<link rel="stylesheet" href="/assets/style.css" />
</head>
<body data-page="catalog">
<div id="site-shell"></div>

<main class="page-shell">
  <section class="catalog-hero">
    <div class="shell page-hero-card content-card" data-reveal>
      <div class="eyebrow">Agents catalog</div>
      <h1>Start with a preset. Or build the browser worker you actually want.</h1>
      <p class="lede">The flagship is still Custom Agent / Web Runner. The starter agents are simply faster entry points for common recurring browser jobs.</p>
    </div>
  </section>

  <section class="page-section">
    <div class="shell">
      <div id="featured"></div>
      <div class="search-toolbar" data-reveal>
        <div class="field">
          <label for="q">Filter starter agents</label>
          <input id="q" type="search" class="input" placeholder="jobs, inbox, research…" />
        </div>
        <div class="field">
          <label for="hub">Hub bot username</label>
          <input id="hub" type="text" class="input" placeholder="@YourHubBot" />
        </div>
      </div>
      <div id="catalog" class="agent-grid"></div>
      <div id="empty" class="release-empty" hidden>No starter agents match this filter.</div>
    </div>
  </section>
</main>

<div id="site-footer"></div>
<script src="/assets/site.js"></script>
<script>
  const STORAGE_KEY = 'ctxant.hub_username';
  const STARTER_ORDER = [
    'job_hunter',
    'deal_finder',
    'inbox_triage',
    'morning_digest',
    'researcher',
    'social_poster',
    'lead_tracker',
    'meeting_prep',
    'support_triage',
    'invoice_collector',
    'marketplace_monitor',
    'web_runner'
  ];
  const STARTER_POSITION = Object.fromEntries(STARTER_ORDER.map((slug, index) => [slug, index]));
  const featured = document.getElementById('featured');
  const catalog = document.getElementById('catalog');
  const q = document.getElementById('q');
  const hub = document.getElementById('hub');
  const empty = document.getElementById('empty');
  let manifests = null;

  function esc(s) {
    if (s == null) return '';
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  function icon(agent, className = 'agent-icon') {
    if (window.CtxAntUI && agent && agent.icon) {
      const rendered = window.CtxAntUI.renderIcon(agent.icon, `${agent.name} icon`, className);
      if (rendered) return rendered;
    }
    return `<span class="${className}">${esc(agent && agent.emoji ? agent.emoji : '•')}</span>`;
  }

  function cleanHub(raw) {
    const s = (raw || '').trim();
    if (!s) return '';
    const m = s.match(/(?:t\.me\/|@)?([A-Za-z0-9_]{4,})/);
    return m ? m[1] : '';
  }

  function deployUrl(slug) {
    const username = cleanHub(hub.value);
    return username ? `https://t.me/${username}?start=deploy_${slug}` : '#needs-hub';
  }

  function actionAttrs(url) {
    if (url === '#needs-hub') {
      return 'onclick="alert(\'Set your hub bot username first.\'); event.preventDefault();"';
    }
    return 'target="_blank" rel="noopener"';
  }

  function matches(agent, query) {
    if (!query) return true;
    const hay = [agent.name, agent.slug, agent.tagline, agent.catalog_blurb, ...(agent.chips || [])].join(' ').toLowerCase();
    return hay.includes(query.toLowerCase());
  }

  function render() {
    if (!manifests) return;
    const flagship = manifests.flagship;
    const deploy = deployUrl(flagship.deploy_slug || 'web_runner');
    featured.innerHTML = `
      <div class="featured-split">
        <article class="content-card" data-reveal>
          <div class="eyebrow">Flagship</div>
          <div class="page-hero-identity">
            ${icon(flagship)}
            <div class="identity-copy">
              <div class="identity-label">Browser workflow</div>
              <h2 class="identity-title">${esc(flagship.name)}</h2>
            </div>
          </div>
          <p class="text-lead">${esc(flagship.long_description)}</p>
          <div class="chip-row">
            ${(flagship.chips || []).map(chip => `<span class="chip">${esc(chip)}</span>`).join('')}
          </div>
          <div class="action-row">
            <a class="btn btn-primary" href="/agents/">See the full workflow</a>
            <a class="pill-button" href="${deploy}" ${actionAttrs(deploy)}>${deploy === '#needs-hub' ? 'Set hub to deploy' : 'Deploy Web Runner'}</a>
          </div>
        </article>
        <article class="content-card" data-reveal>
          <div class="eyebrow">Good first automations</div>
          <div class="detail-list">
            ${(flagship.good_for || []).slice(0, 6).map(item => `<div class="item">${esc(item)}</div>`).join('')}
          </div>
        </article>
      </div>
    `;

    const query = q.value.trim();
    const visible = (manifests.agents || [])
      .filter(agent => matches(agent, query))
      .sort((a, b) => {
        const ai = STARTER_POSITION[a.slug] ?? 999;
        const bi = STARTER_POSITION[b.slug] ?? 999;
        if (ai !== bi) return ai - bi;
        return (a.name || '').localeCompare(b.name || '');
      });
    empty.hidden = !!visible.length;
    catalog.innerHTML = visible.map(agent => {
      const deployLink = deployUrl(agent.slug);
      return `
        <article class="agent-card content-card" data-reveal>
          ${icon(agent)}
          <h3>${esc(agent.name)}</h3>
          <p class="agent-copy">${esc(agent.tagline)}</p>
          <div class="chip-row">
            ${(agent.chips || []).map(chip => `<span class="chip">${esc(chip)}</span>`).join('')}
          </div>
          <div class="note spacious">${esc(agent.catalog_blurb || '')}</div>
          <div class="action-row">
            <a class="btn btn-primary" href="/templates/agent.html?slug=${encodeURIComponent(agent.slug)}">View details</a>
            <a class="pill-button" href="${deployLink}" ${actionAttrs(deployLink)}>${deployLink === '#needs-hub' ? 'Set hub to deploy' : 'Deploy'}</a>
          </div>
        </article>
      `;
    }).join('');

    document.dispatchEvent(new Event('ctxant:refresh-reveal'));
  }

  hub.value = localStorage.getItem(STORAGE_KEY) || '';
  hub.addEventListener('input', () => {
    localStorage.setItem(STORAGE_KEY, hub.value.trim());
    render();
  });
  q.addEventListener('input', render);

  fetch('/templates/agent-manifests.json')
    .then(r => r.json())
    .then(data => {
      manifests = data;
      render();
    })
    .catch(() => {
      featured.innerHTML = '<div class="release-empty">Failed to load the agents catalog.</div>';
    });
</script>
</body>
</html>
